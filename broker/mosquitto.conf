# Mosquitto Configuration (B1)
# Port & Authentication
listener 1883
allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/acl

# Persistence
persistence true
persistence_location /var/lib/mosquitto/

# Limits & Timeout
max_packet_size 65535

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
